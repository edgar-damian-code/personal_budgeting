bundle:
  name: personal-budgeting

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID

resources:
  apps:
    app:
      name: "personal-budgeting"
      description: "Personal budgeting and cash flow dashboard sourced from Tiller Money via Databricks ELT"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # Start the app automatically on deploy.
      lifecycle:
        started: true

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-287e5e4a-7759.cloud.databricks.com

    variables:
      sql_warehouse_id: 9d84d8c8189a5847
